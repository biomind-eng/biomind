project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "!README.md"

website:
  title: "BioMIND"
  description: "BioAI, Molecular Intelligence, Networks, and Discovery — a UCF interdisciplinary research cluster."
  site-url: "https://biomind-eng.github.io/biomind/"
  repo-url: "https://github.com/biomind-eng/biomind"
  repo-actions: [edit, issue]
  favicon: assets/logo/favicon.svg
  search:
    location: navbar
    type: overlay
  page-navigation: true
  back-to-top-navigation: true

  navbar:
    logo: assets/logo/biomind-mark.svg
    background: primary
    foreground: light
    pinned: true
    collapse-below: lg
    left:
      - href: index.qmd
        text: Home
      - href: people/index.qmd
        text: People
      - href: research/index.qmd
        text: Research
      - href: publications/index.qmd
        text: Publications
      - href: labs/index.qmd
        text: Labs
      - href: news/index.qmd
        text: News
      - href: seminars/index.qmd
        text: Seminars
      - text: "Activities"
        menu:
          - href: outreach/index.qmd
            text: Outreach
          - href: funding/index.qmd
            text: Funding
          - href: collaborators/index.qmd
            text: Collaborators
      - href: contact.qmd
        text: Contact
    right:
      - icon: github
        href: https://github.com/biomind-eng/biomind
        aria-label: BioMIND on GitHub

  page-footer:
    background: light
    left: |
      &copy; 2026 BioMIND Research Cluster — University of Central Florida.
      Beta site. Branding pending UCF approval.
    center:
      - text: "About"
        href: about.qmd
      - text: "People"
        href: people/index.qmd
      - text: "Research"
        href: research/index.qmd
      - text: "Contact"
        href: contact.qmd
    right: |
      Built with [Quarto](https://quarto.org).

format:
  html:
    theme:
      light: cosmo
    css: styles.css
    toc: true
    toc-depth: 3
    toc-location: right
    smooth-scroll: true
    anchor-sections: true
    link-external-newwindow: true
    code-copy: true
    code-overflow: wrap
    fig-cap-location: bottom
    tbl-cap-location: top
    citations-hover: true
    footnotes-hover: true

execute:
  freeze: auto
  echo: false
  warning: false
